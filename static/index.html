<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>RhythmPurin</title>
	<link rel="stylesheet" href="stylesheet.css">
</head>

<body>
        <div id="gameInfo">
                <div>Score: <span id="scoreCount">0</span></div>
                <div>Combo: <span id="comboCount">0</span></div>
                <div>
                    Perfect: <span id="perfectCount">0</span>
                    Good: <span id="goodCount">0</span>
                    Miss: <span id="missCount">0</span>
                </div>
        </div>

        <div id="gameContainer">
                <canvas id="gameCanvas" width="800" height="800"></canvas>
                <div id="debugInfo"></div>
                <div id="hitFeedback"></div>
        </div>

        <div id="keyDisplay">
                <div class="key" id="key-h">H</div>
                <div class="key" id="key-j">J</div>
                <div class="key" id="key-k">K</div>
                <div class="key" id="key-l">L</div>
        </div>
</body>
</html>
